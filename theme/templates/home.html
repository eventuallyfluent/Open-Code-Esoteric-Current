<!-- wp:group {"tagName":"main","layout":{"type":"default"}} -->
<main class="wp-block-group">
  <!-- Compact Hero -->
  <!-- wp:group {"layout":{"type":"default"},"className":"ec-hero"} -->
  <div class="wp-block-group ec-hero">
    <!-- wp:group {"layout":{"type":"default"}} -->
    <div class="wp-block-group">
      <!-- wp:heading {"level":1,"textAlign":"center","fontFamily":"display"} -->
      <h1 class="wp-block-heading has-text-align-center has-display-font-family">Discover the world of esotericism</h1>
      <!-- /wp:heading -->
      <!-- wp:paragraph {"align":"center"} -->
      <p class="has-text-align-center">A curated index of esoteric research, resources, and discovery</p>
      <!-- /wp:paragraph -->
      <!-- wp:html -->
      <div class="ec-hero-search" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <form action="/" method="get">
          <input type="search" name="s" placeholder="Search books, courses, research, events..." aria-label="Search the catalogue" />
        </form>
      </div>
      <!-- /wp:html -->
    </div>
    <!-- /wp:group -->
  </div>
  <!-- /wp:group -->

  <!-- Resource Tabs -->
  <!-- wp:html -->
  <div class="ec-tabs" role="tablist" aria-label="Resource types">
    <a href="/" class="ec-tab" data-tab="">All</a>
    <a href="/?ec_tab=books" class="ec-tab" data-tab="books">Books</a>
    <a href="/?ec_tab=courses" class="ec-tab" data-tab="courses">Courses</a>
    <a href="/?ec_tab=research-papers" class="ec-tab" data-tab="research-papers">Research</a>
    <a href="/?ec_tab=events" class="ec-tab" data-tab="events">Events</a>
    <a href="/?ec_tab=podcasts" class="ec-tab" data-tab="podcasts">Podcasts</a>
    <a href="/?ec_tab=teachers" class="ec-tab" data-tab="teachers">Teachers</a>
    <a href="/?ec_tab=organizations" class="ec-tab" data-tab="organizations">Organizations</a>
  </div>
  <script>(function(){var t=new URLSearchParams(window.location.search).get('ec_tab')||'';document.querySelectorAll('.ec-tab').forEach(function(e){if(e.getAttribute('data-tab')===t)e.classList.add('ec-tab-active')})})();</script>
  <!-- /wp:html -->

  <!-- Filter Bar -->
  <!-- wp:html -->
  <div class="ec-filter-bar">
    <span class="ec-filter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7"/><path d="M4 10V3"/><path d="M12 21v-9"/><path d="M12 8V3"/><path d="M20 21v-5"/><path d="M20 12V3"/><path d="M2 14h4"/><path d="M10 8h4"/><path d="M18 16h4"/></svg>
      <span class="ec-filter-label">Tradition</span>
    </span>
    <span class="ec-filter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span class="ec-filter-label">Topic</span>
    </span>
    <span class="ec-filter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="ec-filter-label">Level</span>
    </span>
    <span class="ec-filter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
      <span class="ec-filter-label">Access</span>
    </span>
    <span class="ec-filter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5h6"/><path d="M11 9h4"/><path d="M11 13h2"/><path d="M3 17l3 3 3-3"/><path d="M9 21H3v-6"/></svg>
      <span class="ec-filter-label">Sort</span>
    </span>
  </div>
  <!-- /wp:html -->

  <!-- Findings Grid -->
  <!-- wp:ec/editorial-feed {"count":24,"display":"grid","show_excerpt":true} /-->

  <!-- Topic Categories -->
  <!-- wp:shortcode -->
  [ec_topic_bar]
  <!-- /wp:shortcode -->
</main>
