name: Esoteric Worker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no submissions)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
        working-directory: worker
      - run: npm start
        working-directory: worker
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-chat
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL || 'https://theesotericcurrent.com' }}
          WORDPRESS_API_SECRET: ${{ secrets.WORDPRESS_API_SECRET }}
          LOG_LEVEL: info
          MAX_RETRIES: '3'
      - name: Notify on failure
        if: failure()
        run: echo "Worker run failed — check logs"
