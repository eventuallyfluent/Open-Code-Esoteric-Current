name: Run Automation Worker

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no API calls)'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./worker/package-lock.json
      - run: npm ci --omit=dev
      - name: Test health endpoint
        run: curl -sSf "${{ secrets.WORDPRESS_URL }}/wp-json/ec/v1/health" || echo "health check failed"
      - name: Run worker
        run: node src/index.js 2>&1
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_API_SECRET: ${{ secrets.WORDPRESS_API_SECRET }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
